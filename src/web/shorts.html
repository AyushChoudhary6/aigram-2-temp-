<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Aigram Shorts</title>
    <style>
        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ============================================
           SCROLL SNAP CONTAINER
           ============================================ */
        #shorts-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            overflow-x: hidden;
            
            /* Scroll snap for smooth paging */
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            
            /* Prevent rubber band effect on iOS */
            overscroll-behavior: contain;
            
            /* Hide scrollbar but allow scrolling */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* Hide scrollbar in Chrome, Safari, Edge */
        #shorts-container::-webkit-scrollbar {
            display: none;
        }

        /* ============================================
           VIDEO ITEM STYLING
           ============================================ */
        .video-item {
            width: 100%;
            height: 100vh;
            position: relative;
            flex-shrink: 0;
            
            /* Snap this element to viewport */
            scroll-snap-align: start;
            scroll-snap-stop: always;
            
            /* Prevent scrolling issues */
            overflow: hidden;
            background: #000;
        }

        /* Video element - fills entire screen */
        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ============================================
           OVERLAY CONTROLS
           ============================================ */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            z-index: 10;
        }

        /* Left side: video info */
        .video-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-self: flex-start;
        }

        .creator-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-weight: 600;
        }

        .creator-details {
            display: flex;
            flex-direction: column;
        }

        .creator-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
        }

        .creator-handle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            line-height: 1.2;
        }

        .video-title {
            color: white;
            font-size: 14px;
            line-height: 1.4;
            max-width: 300px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Right side: action buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-self: flex-end;
            pointer-events: all;
        }

        .action-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            outline: none;
        }

        .action-button:active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Status indicator */
        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: #4ade80;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            pointer-events: none;
            z-index: 20;
        }

        /* ============================================
           BOTTOM NAVIGATION STYLES
           ============================================ */
        :root {
            --primary: hsl(160, 84%, 39%);
            --primary-foreground: hsl(220, 20%, 6%);
            --muted-foreground: hsl(160, 10%, 60%);
            --background: hsl(220, 20%, 6%);
            --border: hsl(220, 18%, 18%);
            --gradient-primary: linear-gradient(135deg, hsl(160, 84%, 39%), hsl(175, 84%, 35%));
        }

        .bottom-nav {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            pointer-events: auto;
        }

        .nav-container {
            display: flex;
            align-items: end;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 16px;
            background: hsla(220, 18%, 10%, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid hsla(220, 18%, 18%, 0.5);
            box-shadow: 0 10px 40px hsla(220, 20%, 3%, 0.8);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            text-decoration: none;
            color: var(--muted-foreground);
            font-size: 1.5rem;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background: transparent;
            border: none;
            padding: 0;
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        @media (hover: hover) {
            .nav-item:hover {
                transform: scale(1.4) translateY(-20px);
                background: var(--gradient-primary);
                color: var(--primary-foreground);
                box-shadow: 0 0 25px hsla(160, 84%, 39%, 0.4);
            }
        }

        .nav-item.active {
            background: hsla(160, 84%, 39%, 0.2);
            color: var(--primary);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                gap: 4px;
                padding: 8px 12px;
            }

            .nav-item {
                width: 40px;
                height: 40px;
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div id="shorts-container"></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-container">
            <button class="nav-item active" data-page="shorts" onclick="navigateToPage('shorts')" title="Home">🏠</button>
            <button class="nav-item" data-page="practice" onclick="navigateToPage('practice')" title="Practice">🎓</button>
            <button class="nav-item" data-page="marketplace" onclick="navigateToPage('marketplace')" title="Marketplace">🛍️</button>
            <button class="nav-item" data-page="profile" onclick="navigateToPage('profile')" title="Profile">👤</button>
            <button class="nav-item" data-page="business" onclick="navigateToPage('business')" title="Business">💼</button>
            <button class="nav-item" data-page="cofounder" onclick="navigateToPage('cofounder')" title="Cofounder">👥</button>
        </div>
    </div>

    <script>
        // ============================================
        // NAVIGATION HANDLER
        // ============================================
        
        function navigateToPage(page) {
            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            
            // Handle navigation
            if (page === 'shorts') {
                // Stay on shorts/home page
                console.log('[Navigation] Staying on Shorts');
            } else {
                // Navigate to other pages - post message to React Native
                console.log(`[Navigation] Navigating to ${page}`);
                
                // Send navigation event to React Native WebView bridge
                if (window.ReactNativeWebView) {
                    window.ReactNativeWebView.postMessage(JSON.stringify({
                        type: 'NAVIGATION',
                        page: page,
                        timestamp: new Date().toISOString()
                    }));
                }
                // For browser testing, use hash navigation
                else {
                    window.location.hash = page;
                    console.log(`[Navigation] Navigated to #${page}`);
                }
            }
        }

        // Restore active nav based on hash (for browser navigation)
        function restoreNavigation() {
            const page = window.location.hash.slice(1) || 'shorts';
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            const navItem = document.querySelector(`[data-page="${page}"]`);
            if (navItem) {
                navItem.classList.add('active');
            }
        }

        // Listen to hash changes
        window.addEventListener('hashchange', restoreNavigation);

        // ============================================
        // CONFIGURATION
        // ============================================
        
        // Video list - easily configurable
        const VIDEOS = [
            { id: 1, url: '/videos/video1.mp4', title: 'Amazing Shorts Clip 1', creator: 'Creator One' },
            { id: 2, url: '/videos/video2.mp4', title: 'Awesome Moments 2', creator: 'Creator Two' },
            { id: 3, url: '/videos/video3.mp4', title: 'Epic Content 3', creator: 'Creator Three' },
            { id: 4, url: '/videos/video4.mp4', title: 'Must Watch 4', creator: 'Creator Four' },
            { id: 5, url: '/videos/video5.mp4', title: 'Trending Now 5', creator: 'Creator Five' },
        ];

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        const state = {
            currentVideoIndex: 0,
            currentlyPlayingIndex: null,
            isPageActive: true,
            videoElements: new Map(), // Map<index, HTMLVideoElement>
            observers: {
                intersectionObserver: null,
                visibilityObserver: null,
            }
        };

        // ============================================
        // INITIALIZATION
        // ============================================
        
        function initializeShorts() {
            console.log('[Shorts] Initializing...');
            
            // Render video feed
            renderVideoFeed();
            
            // Setup IntersectionObserver for visibility detection
            setupIntersectionObserver();
            
            // Setup lifecycle handlers
            setupLifecycleHandlers();
            
            // Setup scroll intent detection
            setupScrollHandling();
            
            // Initial video playback
            setTimeout(() => {
                playVideoAtIndex(0);
            }, 500);
            
            console.log('[Shorts] Initialized');
        }

        // ============================================
        // RENDER VIDEO FEED
        // ============================================
        
        function renderVideoFeed() {
            const container = document.getElementById('shorts-container');
            
            VIDEOS.forEach((video, index) => {
                const videoItem = document.createElement('div');
                videoItem.className = 'video-item';
                videoItem.dataset.index = index;
                videoItem.id = `video-item-${index}`;
                
                // Video element with autoplay attributes
                const videoElement = document.createElement('video');
                videoElement.src = video.url;
                videoElement.autoplay = false; // Control programmatically to avoid race conditions
                videoElement.muted = true; // Required for autoplay in most browsers/WebViews
                videoElement.playsInline = true; // Critical for iOS
                videoElement.loop = true;
                videoElement.dataset.index = index;
                
                // Error handling
                videoElement.addEventListener('error', (e) => {
                    console.error(`[Video ${index}] Load error:`, e);
                });
                
                videoItem.appendChild(videoElement);
                
                // Overlay controls
                const overlay = document.createElement('div');
                overlay.className = 'video-overlay';
                
                // Video info (left side)
                const infoSection = document.createElement('div');
                infoSection.className = 'video-info';
                infoSection.innerHTML = `
                    <div class="creator-info">
                        <div class="avatar">${video.creator[0]}</div>
                        <div class="creator-details">
                            <div class="creator-name">${video.creator}</div>
                            <div class="creator-handle">@${video.creator.toLowerCase().replace(' ', '')}</div>
                        </div>
                    </div>
                    <div class="video-title">${video.title}</div>
                `;
                overlay.appendChild(infoSection);
                
                // Action buttons (right side)
                const buttonsSection = document.createElement('div');
                buttonsSection.className = 'action-buttons';
                buttonsSection.innerHTML = `
                    <button class="action-button" data-action="like" title="Like">❤️</button>
                    <button class="action-button" data-action="comment" title="Comment">💬</button>
                    <button class="action-button" data-action="share" title="Share">📤</button>
                    <button class="action-button" data-action="sound" title="Toggle Sound">🔊</button>
                `;
                overlay.appendChild(buttonsSection);
                
                // Status badge (for debugging)
                const badge = document.createElement('div');
                badge.className = 'status-badge';
                badge.textContent = `#${index + 1}`;
                overlay.appendChild(badge);
                
                overlay.style.pointerEvents = 'none';
                buttonsSection.style.pointerEvents = 'auto';
                
                videoItem.appendChild(overlay);
                container.appendChild(videoItem);
                
                // Store video element reference
                state.videoElements.set(index, videoElement);
            });
            
            console.log(`[Shorts] Rendered ${VIDEOS.length} videos`);
        }

        // ============================================
        // INTERSECTION OBSERVER - THE HEART OF AUTOPLAY
        // ============================================
        
        function setupIntersectionObserver() {
            // Intersection Observer detects which video is most visible
            const observerOptions = {
                root: document.getElementById('shorts-container'),
                rootMargin: '0px',
                // 70% visibility threshold - video must be 70% visible to be considered "active"
                threshold: [0.0, 0.3, 0.5, 0.7, 0.9, 1.0]
            };
            
            const observerCallback = (entries) => {
                // Find the most visible video
                let mostVisibleEntry = null;
                let maxVisibility = 0;
                
                entries.forEach(entry => {
                    const visibilityRatio = entry.intersectionRatio;
                    
                    // Only consider videos that are at least 50% visible
                    if (visibilityRatio > 0.5 && visibilityRatio > maxVisibility) {
                        maxVisibility = visibilityRatio;
                        mostVisibleEntry = entry;
                    }
                });
                
                // If we found a clearly visible video, play it
                if (mostVisibleEntry) {
                    const index = parseInt(mostVisibleEntry.target.dataset.index);
                    
                    if (index !== state.currentVideoIndex) {
                        console.log(`[Observer] Video ${index} is most visible (${(maxVisibility * 100).toFixed(0)}%)`);
                        
                        // Pause previous video
                        if (state.currentVideoIndex !== null) {
                            pauseVideoAtIndex(state.currentVideoIndex);
                        }
                        
                        // Update state and play new video
                        state.currentVideoIndex = index;
                        playVideoAtIndex(index);
                    }
                }
            };
            
            const observer = new IntersectionObserver(observerCallback, observerOptions);
            
            // Observe all video items
            document.querySelectorAll('.video-item').forEach(item => {
                observer.observe(item);
            });
            
            state.observers.intersectionObserver = observer;
            console.log('[Shorts] IntersectionObserver set up');
        }

        // ============================================
        // SCROLL HANDLING
        // ============================================
        
        function setupScrollHandling() {
            const container = document.getElementById('shorts-container');
            let isScrolling = false;
            let scrollTimeout = null;
            
            container.addEventListener('scroll', () => {
                // Debounce scroll events
                if (scrollTimeout) {
                    clearTimeout(scrollTimeout);
                }
                
                isScrolling = true;
                
                // Reset scrolling flag after scroll ends
                scrollTimeout = setTimeout(() => {
                    isScrolling = false;
                }, 150);
            }, { passive: true });
            
            console.log('[Shorts] Scroll handling set up');
        }

        // ============================================
        // VIDEO PLAYBACK CONTROL
        // ============================================
        
        function playVideoAtIndex(index) {
            const videoElement = state.videoElements.get(index);
            
            if (!videoElement) {
                console.warn(`[Play] Video ${index} not found`);
                return;
            }
            
            // Pause all other videos first
            state.videoElements.forEach((video, idx) => {
                if (idx !== index && video.playing) {
                    video.pause();
                    console.log(`[Play] Paused video ${idx}`);
                }
            });
            
            // Play the target video
            console.log(`[Play] ▶️ Playing video ${index}`);
            
            // Check if video has loaded metadata
            if (videoElement.readyState >= 1) {
                // Metadata is ready
                videoElement.play().catch((error) => {
                    console.error(`[Play] Error playing video ${index}:`, error);
                });
            } else {
                // Wait for metadata to load
                videoElement.addEventListener('loadedmetadata', () => {
                    videoElement.play().catch((error) => {
                        console.error(`[Play] Error playing video ${index}:`, error);
                    });
                }, { once: true });
            }
            
            state.currentlyPlayingIndex = index;
        }

        function pauseVideoAtIndex(index) {
            const videoElement = state.videoElements.get(index);
            
            if (!videoElement || !videoElement.playing) {
                return;
            }
            
            console.log(`[Pause] ⏸️ Pausing video ${index}`);
            videoElement.pause();
        }

        // ============================================
        // LIFECYCLE HANDLERS
        // ============================================
        
        function setupLifecycleHandlers() {
            // Handle visibility change (WebView background/foreground)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    console.log('[Lifecycle] Page hidden - pausing video');
                    
                    // Pause currently playing video
                    if (state.currentlyPlayingIndex !== null) {
                        pauseVideoAtIndex(state.currentlyPlayingIndex);
                    }
                    
                    state.isPageActive = false;
                } else {
                    console.log('[Lifecycle] Page visible - resuming video');
                    
                    // Resume currently visible video
                    state.isPageActive = true;
                    
                    if (state.currentVideoIndex !== null) {
                        playVideoAtIndex(state.currentVideoIndex);
                    }
                }
            });
            
            // Handle page hide/show
            window.addEventListener('pagehide', () => {
                console.log('[Lifecycle] pagehide - pausing all');
                
                state.videoElements.forEach((video) => {
                    if (video.playing) {
                        video.pause();
                    }
                });
            });
            
            window.addEventListener('pageshow', () => {
                console.log('[Lifecycle] pageshow - resuming');
                
                if (state.isPageActive && state.currentVideoIndex !== null) {
                    playVideoAtIndex(state.currentVideoIndex);
                }
            });
            
            // Handle focus/blur
            window.addEventListener('blur', () => {
                console.log('[Lifecycle] Window blur - pausing');
                if (state.currentlyPlayingIndex !== null) {
                    pauseVideoAtIndex(state.currentlyPlayingIndex);
                }
            });
            
            window.addEventListener('focus', () => {
                console.log('[Lifecycle] Window focus - resuming');
                if (state.isPageActive && state.currentVideoIndex !== null) {
                    playVideoAtIndex(state.currentVideoIndex);
                }
            });
            
            console.log('[Shorts] Lifecycle handlers set up');
        }

        // ============================================
        // CLEANUP
        // ============================================
        
        window.addEventListener('beforeunload', () => {
            console.log('[Shorts] Cleaning up...');
            
            // Pause all videos
            state.videoElements.forEach((video) => {
                video.pause();
            });
            
            // Disconnect observers
            if (state.observers.intersectionObserver) {
                state.observers.intersectionObserver.disconnect();
            }
        });

        // ============================================
        // START
        // ============================================
        
        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeShorts);
        } else {
            initializeShorts();
        }

        // ============================================
        // DEBUGGING
        // ============================================
        
        // Expose state to console for debugging
        window.__shortsDebug = {
            state,
            playVideoAtIndex,
            pauseVideoAtIndex,
            logVideoStates: () => {
                state.videoElements.forEach((video, idx) => {
                    console.log(`Video ${idx}: playing=${video.playing}, paused=${video.paused}, readyState=${video.readyState}`);
                });
            }
        };
    </script>
</body>
</html>
