# Server Configuration
server.port=${PORT:3000}
server.servlet.context-path=/
#
# Allow encoded slashes in path variables (e.g. folder names like profile/user/photos)
# Needed for endpoints like /api/upload/folder/{folderName} where folderName may contain '/'
server.tomcat.allow-encoded-slash=true

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Azure Storage Configuration
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:default-storage}
azure.storage.account-key=${AZURE_STORAGE_ACCOUNT_KEY:default-key}
azure.storage.container-name=${AZURE_BLOB_CONTAINER_NAME:default-container}
azure.storage.sas-expiry-hours=${SAS_TOKEN_EXPIRY_HOURS:24}

# Azure Cosmos DB Configuration
azure.cosmos.endpoint=${AZURE_COSMOS_ENDPOINT:https://default.documents.azure.com:443/}
azure.cosmos.key=${AZURE_COSMOS_KEY:default-cosmos-key}
azure.cosmos.database=${AZURE_COSMOS_DATABASE:default-database}
azure.cosmos.container=${AZURE_COSMOS_CONTAINER:default-container}

# Database Configuration - Disabled for now
# spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aigram}
# spring.datasource.username=${DATABASE_USER:postgres}
# spring.datasource.password=${DATABASE_PASSWORD:password}
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration - Disabled
# spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration - Disabled
spring.flyway.enabled=false
# spring.flyway.baseline-on-migrate=true
# spring.flyway.locations=classpath:db/migration

# Exclude auto-configuration
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.session.SessionAutoConfiguration,\
  org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=jedis

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# Spring Session Configuration
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=1800

# Security Configuration
jwt.secret=${JWT_SECRET:mySecretKey}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGIN:*}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Application Info
info.app.name=Aigram Video Upload Backend
info.app.version=1.0.0
info.app.description=Spring Boot backend for Aigram video upload service
