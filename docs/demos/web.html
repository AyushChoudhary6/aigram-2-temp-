<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gram - Web</title>
    <style>
        :root {
            --background: hsl(220, 20%, 6%);
            --foreground: hsl(160, 20%, 95%);
            --card: hsl(220, 18%, 10%);
            --primary: hsl(160, 84%, 39%);
            --primary-foreground: hsl(220, 20%, 6%);
            --muted: hsl(220, 18%, 14%);
            --muted-foreground: hsl(160, 10%, 60%);
            --border: hsl(220, 18%, 18%);
            --gradient-primary: linear-gradient(135deg, hsl(160, 84%, 39%), hsl(175, 84%, 35%));
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--background);
            color: var(--foreground);
            overflow-x: hidden;
        }
        
        /* Floating Elements Background */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .floating-element {
            position: absolute;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
            font-size: 16px;
        }
        
        .floating-element:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-element:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 2s; }
        .floating-element:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 3s; }
        .floating-element:nth-child(5) { top: 50%; left: 5%; animation-delay: 4s; }
        .floating-element:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        /* Auth Screen Styles */
        .auth-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .auth-container {
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: hsla(160, 84%, 39%, 0.2);
            border: 1px solid hsla(160, 84%, 39%, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .logo-title {
            font-size: 2rem;
            font-weight: bold;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .logo-subtitle {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
            margin-top: 4px;
        }
        
        .logo-subtitle-text {
            font-size: 10px;
            color: var(--muted-foreground);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .glass-card {
            position: relative;
        }
        
        .card-glow {
            position: absolute;
            inset: -4px;
            background: var(--gradient-primary);
            border-radius: 28px;
            opacity: 0.3;
            filter: blur(20px);
        }
        
        .card-content {
            position: relative;
            background: hsla(220, 18%, 10%, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            border-radius: 24px;
            padding: 2rem;
        }
        
        .corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 2px solid hsla(160, 84%, 39%, 0.4);
        }
        
        .corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 24px; }
        .corner-tr { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 24px; }
        .corner-bl { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 24px; }
        .corner-br { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 24px; }
        
        .step-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .step-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: hsla(160, 84%, 39%, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 32px;
        }
        
        .step-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 0.5rem;
        }
        
        .step-subtitle {
            font-size: 0.875rem;
            color: var(--muted-foreground);
            line-height: 1.4;
        }
        
        .input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }
        
        .country-code {
            height: 56px;
            padding: 0 16px;
            border-radius: 12px;
            background: hsla(220, 18%, 10%, 0.3);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted-foreground);
            font-size: 1rem;
        }
        
        .phone-input {
            flex: 1;
            height: 56px;
            padding: 0 16px;
            border-radius: 12px;
            background: hsla(220, 18%, 10%, 0.3);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            color: var(--foreground);
            font-size: 1.125rem;
            transition: all 0.3s;
        }
        
        .phone-input:focus {
            outline: none;
            border-color: hsla(160, 84%, 39%, 0.5);
            box-shadow: 0 0 0 2px hsla(160, 84%, 39%, 0.2);
        }
        
        .phone-input::placeholder {
            color: hsla(160, 10%, 60%, 0.5);
        }
        
        .btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            color: var(--primary-foreground);
            box-shadow: 0 4px 12px hsla(160, 84%, 39%, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px hsla(160, 84%, 39%, 0.4);
        }
        
        .btn-secondary {
            background: hsla(220, 18%, 10%, 0.2);
            color: var(--primary);
            border: 1px solid hsla(160, 84%, 39%, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .btn-secondary:hover {
            background: var(--primary);
            color: var(--primary-foreground);
        }
        
        .divider {
            margin: 1.5rem 0;
            text-align: center;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            background: hsla(220, 18%, 10%, 0.4);
            backdrop-filter: blur(10px);
            padding: 0 1rem;
            color: var(--muted-foreground);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid hsla(160, 84%, 39%, 0.1);
            border-radius: 20px;
        }
        
        /* Main App Styles */
        .main-app {
            position: fixed;
            inset: 0;
            background: var(--background);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: hsla(220, 18%, 10%, 0.8);
            backdrop-filter: blur(20px);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 40;
        }
        
        .header h1 {
            margin: 0;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            background: var(--primary);
            color: var(--primary-foreground);
        }
        
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
        }
        
        /* Stories Bar */
        .stories-bar {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        
        .stories-container {
            display: flex;
            gap: 1rem;
        }
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            cursor: pointer;
        }
        
        .story-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary-foreground);
            position: relative;
        }
        
        .story-avatar.add-story::after {
            content: '+';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid var(--background);
        }
        
        .story-name {
            font-size: 0.75rem;
            color: var(--muted-foreground);
            text-align: center;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* Video Feed */
        .video-feed {
            padding: 1rem;
        }
        
        .video-item {
            background: hsla(220, 18%, 10%, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        
        .video-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .video-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-foreground);
            font-weight: bold;
        }
        
        .video-info h3 {
            margin: 0;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .video-info p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }
        
        .video-placeholder {
            width: 100%;
            height: 200px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .video-actions {
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: var(--muted-foreground);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        
        .action-btn:hover {
            color: var(--primary);
        }
        
        /* Practice Page */
        .practice-header {
            padding: 1.5rem;
            text-align: center;
        }
        
        .practice-title {
            font-size: 1.875rem;
            font-weight: bold;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .practice-subtitle {
            color: var(--muted-foreground);
            font-size: 0.875rem;
        }
        
        .progress-card {
            margin: 1rem;
            padding: 1.5rem;
            background: hsla(220, 18%, 10%, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            border-radius: 16px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .progress-info h3 {
            margin: 0;
            color: var(--foreground);
        }
        
        .progress-info p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }
        
        .trophy-icon {
            font-size: 3rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--muted);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            width: 25%;
            transition: width 0.3s;
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }
        
        .level-item {
            margin: 1rem;
            padding: 1.5rem;
            background: hsla(220, 18%, 10%, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .level-item:hover {
            border-color: hsla(160, 84%, 39%, 0.5);
            box-shadow: 0 0 25px hsla(160, 84%, 39%, 0.2);
        }
        
        .level-item.current {
            border-color: var(--primary);
            box-shadow: 0 0 25px hsla(160, 84%, 39%, 0.3);
        }
        
        .level-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .level-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--primary-foreground);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .level-number.completed {
            background: var(--primary);
        }
        
        .level-number.locked {
            background: var(--muted);
            color: var(--muted-foreground);
        }
        
        .level-info h3 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .level-info p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }
        
        .xp-badge {
            background: hsla(160, 84%, 39%, 0.2);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: auto;
        }
        
        /* Marketplace Page */
        .marketplace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .marketplace-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }
        
        .token-badge {
            background: hsla(220, 18%, 14%, 0.8);
            color: var(--foreground);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .search-section {
            padding: 1rem;
        }
        
        .search-input {
            width: 100%;
            height: 48px;
            padding: 0 1rem 0 3rem;
            border-radius: 12px;
            background: hsla(220, 18%, 10%, 0.3);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            color: var(--foreground);
            font-size: 1rem;
            position: relative;
        }
        
        .search-input:focus {
            outline: none;
            border-color: hsla(160, 84%, 39%, 0.5);
            box-shadow: 0 0 0 2px hsla(160, 84%, 39%, 0.2);
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-foreground);
        }
        
        .categories {
            display: flex;
            gap: 0.5rem;
            padding: 0 1rem 1rem;
            overflow-x: auto;
        }
        
        .category-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: hsla(220, 18%, 10%, 0.3);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            color: var(--muted-foreground);
            font-size: 0.875rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .category-btn.active {
            background: var(--primary);
            color: var(--primary-foreground);
            border-color: var(--primary);
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            padding: 1rem;
        }
        
        .tool-card {
            background: hsla(220, 18%, 10%, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tool-card:hover {
            border-color: hsla(160, 84%, 39%, 0.5);
            box-shadow: 0 0 25px hsla(160, 84%, 39%, 0.2);
        }
        
        .tool-icon {
            width: 100%;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .tool-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--foreground);
        }
        
        .tool-description {
            font-size: 0.75rem;
            color: var(--muted-foreground);
            line-height: 1.4;
            margin-bottom: 1rem;
        }
        
        .tool-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .tool-rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: var(--muted-foreground);
        }
        
        .tool-price {
            background: hsla(160, 84%, 39%, 0.2);
            color: var(--primary);
            padding: 0.25rem 0.5rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        /* Profile Page */
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .profile-username {
            font-size: 1.125rem;
            font-weight: bold;
        }
        
        .profile-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: none;
            border: none;
            color: var(--muted-foreground);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: hsla(160, 84%, 39%, 0.1);
            color: var(--primary);
        }
        
        .profile-info {
            padding: 1.5rem;
        }
        
        .profile-main {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary-foreground);
            font-weight: bold;
            border: 2px solid hsla(160, 84%, 39%, 0.5);
        }
        
        .profile-details h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            font-weight: bold;
        }
        
        .profile-bio {
            color: var(--muted-foreground);
            font-size: 0.875rem;
            line-height: 1.4;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        .stat-card {
            text-align: center;
            padding: 1rem;
            background: hsla(220, 18%, 10%, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        
        .stat-icon {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 1.125rem;
            font-weight: bold;
            color: var(--foreground);
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            font-size: 0.625rem;
            color: var(--muted-foreground);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Business Page */
        .business-header {
            text-align: center;
            padding: 1.5rem;
        }
        
        .business-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--foreground);
            margin-bottom: 0.25rem;
        }
        
        .business-subtitle {
            color: var(--muted-foreground);
            font-size: 0.875rem;
        }
        
        .business-progress {
            margin: 1rem;
            padding: 1rem;
            background: hsla(220, 18%, 10%, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid hsla(160, 84%, 39%, 0.2);
            border-radius: 16px;
            text-align: center;
        }
        
        .business-map {
            padding: 2rem 1rem;
            position: relative;
            min-height: 600px;
        }
        
        .program-node {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 1.5rem;
        }
        
        .program-node.completed {
            background: var(--primary);
            color: var(--primary-foreground);
            box-shadow: 0 0 25px hsla(160, 84%, 39%, 0.4);
        }
        
        .program-node.current {
            background: var(--primary);
            color: var(--primary-foreground);
            box-shadow: 0 0 25px hsla(160, 84%, 39%, 0.6);
            animation: pulse 2s infinite;
        }
